<style>
:root {
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2a;--surface:#1e1e30;--border:#2a2a40;
  --lime:#b8ff3c;--lime-dim:rgba(184,255,60,0.10);--lime-glow:rgba(184,255,60,0.22);

  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.10);
  --teal:#2dd4bf;--orange:#fb923c;--red:#ff5a5a;
  --radius:16px;--radius-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}
.glow-blob{position:fixed;width:420px;height:420px;background:radial-gradient(circle,rgba(184,255,60,.05) 0%,transparent 70%);top:-100px;right:-120px;border-radius:50%;pointer-events:none;z-index:0}

/* ── HEADER ── */
.module-header{position:sticky;top:0;z-index:100;background:rgba(13,13,20,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 18px;height:56px;display:flex;align-items:center;gap:14px}
.btn-back{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-soft);font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;transition:background .15s;-webkit-tap-highlight-color:transparent}
.btn-back:active{background:var(--bg3)}
.module-header-info{flex:1;overflow:hidden}
.module-header-tag{font-family:'Syne Mono',monospace;font-size:.58rem;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;display:block}
.module-header-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.mode-chip{font-family:'Syne Mono',monospace;font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,158,255,.25);white-space:nowrap;flex-shrink:0}

/* ── TABS ── */
.tabs-wrap{padding:14px 18px 12px;position:sticky;top:56px;z-index:90;background:var(--bg);border-bottom:1px solid var(--border)}
.tabs-label{font-family:'Syne Mono',monospace;font-size:.58rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.tabs-row{display:flex;gap:6px}
.tab-btn{flex:1;height:44px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;-webkit-tap-highlight-color:transparent}
.tab-btn:active{transform:scale(.95)}
.tab-num{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text-dim);letter-spacing:-.02em}
.tab-btn.active{border-color:var(--blue);background:var(--blue-dim)}

.tab-btn.solved .tab-num{color:var(--lime)}

.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:48px}

.contexto-text strong{color:var(--text);font-weight:600}
.contexto-text em{color:var(--teal);font-style:normal;font-weight:600}

/* ── ACTIONS BAR ── */

.form-card.orange .form-name{color:var(--orange)}

.btn-borrar:active{opacity:.7}
.btn-cerrar-piz{background:var(--purple);border:none;border-radius:var(--radius-sm);padding:7px 14px;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;color:var(--bg);cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}

#pizarra-canvas{flex:1;display:block;width:100%;height:100%;background:#0e0e1a;touch-action:none;cursor:crosshair}

<script>
// ══════════════════════════════════════════
//  FORMULARIO BINOMIAL
// ══════════════════════════════════════════
function formularioHTML() {
  return `<div class="formulario-inner">
    <div class="form-sec-title" style="color:var(--blue)">Fórmula de la distribución binomial</div>
    <div class="form-card blue">
      <div class="form-name">Probabilidad de exactamente $k$ éxitos</div>
      <div class="form-expr">$$P(X=k)=\\binom{n}{k}\\,p^k\\,(1-p)^{n-k}$$</div>
      <div class="form-note">
        <b>$n$</b> = nº de repeticiones del experimento &nbsp;·&nbsp;
        <b>$p$</b> = probabilidad de éxito en cada repetición &nbsp;·&nbsp;
        <b>$k$</b> = nº de éxitos que queremos calcular
      </div>
    </div>
    <div class="form-sec-title" style="color:var(--teal);margin-top:4px">Número combinatorio $\\binom{n}{k}$</div>
    <div class="form-card teal">
      <div class="form-name">Definición mediante factoriales</div>
      <div class="form-expr">$$\\binom{n}{k}=\\frac{n!}{k!\\,(n-k)!}$$</div>
      <div class="form-note">
        Recuerda: $n! = n\\cdot(n-1)\\cdot(n-2)\\cdots2\\cdot1$ &nbsp;·&nbsp; Por convenio, $0!=1$
      </div>
    </div>
    <div class="form-sec-title" style="color:var(--orange);margin-top:4px">Acumuladas frecuentes en EBAU</div>
    <div class="form-card orange">
      <div class="form-name">«Al menos $k$» / «como mínimo $k$»</div>
      <div class="form-expr">$P(X \\geq k) = 1 - P(X \\leq k-1)$</div>
    </div>
    <div class="form-card orange">
      <div class="form-name">«A lo sumo $k$» / «como máximo $k$»</div>
      <div class="form-expr">$P(X \\leq k) = P(X=0)+P(X=1)+\\cdots+P(X=k)$</div>
    </div>
    <div class="form-sec-title" style="color:var(--lime);margin-top:4px">Ejemplo resuelto</div>
    <div class="form-card lime">
      <div class="form-name">Se lanza una moneda 4 veces. ¿Prob. de exactamente 3 caras?</div>
      <div class="form-expr">
        $n=4,\\; k=3,\\; p=0{,}5$<br>
        $\\displaystyle\\binom{4}{3}=\\frac{4!}{3!\\cdot1!}=\\frac{24}{6}=4$<br>
        $P(X=3)=4\\cdot(0{,}5)^3\\cdot(0{,}5)^1=4\\cdot0{,}125\\cdot0{,}5=\\mathbf{0{,}25}$
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════
//  DATOS DE LOS PROBLEMAS
// ══════════════════════════════════════════
const problems = [

// ───────────────────────────────────────────
// P1 · CONTROL DE CALIDAD
// ───────────────────────────────────────────
{id:1, tipo:"$P(X=k)$ · exactamente", titulo:"Control de calidad en fábrica",
contexto:`Una fábrica de componentes electrónicos sabe, por su historial de producción, que <strong>el 10% de las piezas fabricadas presenta algún defecto menor</strong> que no impide su funcionamiento pero que puede ser reclamado por el cliente. Un inspector de calidad toma <strong>una muestra de 5 piezas</strong> al azar de la línea de producción para realizar un control rutinario. Se supone que las piezas son independientes entre sí y que la proporción de defectuosas se mantiene estable.`,
apartados:[
  {letra:"a",
   pregunta:"¿Cuál es la probabilidad de que <strong>exactamente 1</strong> de las 5 piezas sea defectuosa?",
   opciones:[
     "$P(X=1)=5\\cdot(0{,}1)^1\\cdot(0{,}9)^4\\approx0{,}3281$",
     "$P(X=1)=(0{,}1)^1\\cdot(0{,}9)^4\\approx0{,}0656$",
     "$P(X=1)=5\\cdot(0{,}1)^1\\cdot(0{,}9)^5\\approx0{,}2953$"
   ],
   correcta:0,
   desarrollo:`<b>Identificación:</b> $X\\sim B(5,\\,0{,}1)$. Buscamos $P(X=1)$.<br>
$$P(X=1)=\\binom{5}{1}(0{,}1)^1(0{,}9)^4=5\\cdot0{,}1\\cdot0{,}6561=\\class{hl}{0{,}3281}$$
<span class="warn">⚠ Error frecuente:</span> olvidar el combinatorio $\\binom{5}{1}=5$. Sin él se obtiene solo una de las cinco formas posibles de tener 1 defectuosa.`},
  {letra:"b",
   pregunta:"¿Cuál es la probabilidad de que <strong>ninguna</strong> pieza sea defectuosa?",
   opciones:[
     "$P(X=0)=(0{,}9)^5\\approx0{,}5905$",
     "$P(X=0)=(0{,}1)^5\\approx0{,}00001$",
     "$P(X=0)=1-(0{,}9)^5\\approx0{,}4095$"
   ],
   correcta:0,
   desarrollo:`$$P(X=0)=\\binom{5}{0}(0{,}1)^0(0{,}9)^5=1\\cdot1\\cdot0{,}9^5=\\class{hl}{0{,}5905}$$
<span class="sym">k=0</span>: el combinatorio $\\binom{5}{0}=1$ y $(0{,}1)^0=1$, así que solo queda $(0{,}9)^5$.`},

let currentProb = 0, solvedAp = {}, solvedP = new Set(), formularioOpen = false;
function apKey(pi, ai) { return `${pi}-${ai}`; }

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function buildTabs() {
  const row = document.getElementById('tabs-row');
  const chip = document.getElementById('header-chip');
  row.innerHTML = '';
  problems.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === currentProb ? ' active' : '') + (solvedP.has(i) ? ' solved' : '');
    btn.innerHTML = `<span class="tab-num">${i + 1}</span>`;
    btn.onclick = () => { currentProb = i; formularioOpen = false; buildTabs(); renderProblem(); };
    row.appendChild(btn);
  });
  chip.textContent = `P ${currentProb + 1}/${problems.length}`;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderProblem() {
  const pc = document.getElementById('page-content');
  pc.style.animation = 'none';
  requestAnimationFrame(() => { pc.style.animation = ''; });
  const p = problems[currentProb], pi = currentProb;

  let html = `
  <div class="prob-header">
    <div class="prob-num-badge">${p.id}</div>
    <div class="prob-meta">
      <span class="prob-type-tag">${p.tipo}</span>
      <div class="prob-title">${p.titulo}</div>
    </div>
  </div>
  <div class="contexto-card">
    <span class="contexto-tag">📋 Lee el enunciado con atención</span>
    <div class="contexto-text">${p.contexto}</div>
  </div>
  <div class="actions-bar">
    <button class="btn-formula${formularioOpen ? ' open' : ''}" id="btn-formula" onclick="toggleFormulario()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="btn-formula-txt">${formularioOpen ? 'Ocultar fórmulas' : 'Ver fórmulas'}</span>
    </button>
    <button class="btn-pizarra" onclick="openPizarra()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <div class="btn-pizarra-label"><span>Pizarra</span><span class="btn-pizarra-sub">táctil</span></div>
    </button>
  </div>
  <div class="formulario-panel${formularioOpen ? ' open' : ''}" id="formulario-panel">
    ${formularioHTML()}
  </div>
  <div class="apartados-wrap">`;

  p.apartados.forEach((ap, ai) => {
    const solved = !!solvedAp[apKey(pi, ai)];
    html += `<div class="apartado-card${solved ? ' solved' : ''}" id="ap-card-${ai}">
      <div class="apartado-head">
        <div class="apartado-label">Apartado ${ap.letra.toUpperCase()} <span class="check-icon">✓</span></div>
        <div class="apartado-q">${ap.pregunta}</div>
      </div>
      <div class="opts-list" id="opts-${ai}">
        ${ap.opciones.map((o, oi) => `
          <button class="opt-btn${solved && oi === ap.correcta ? ' correct' : ''}" ${solved ? 'disabled' : ''} onclick="checkAns(${ai},${oi})">
            <div class="opt-letter">${['A','B','C'][oi]}</div><span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="feedback${solved ? ' correct' : ''}" id="fb-${ai}" style="display:${solved ? 'block' : 'none'}">${solved ? '✓ Correcto.' : ''}</div>
    </div>`;
  });

  html += `</div>`;
  const hasAny = p.apartados.some((_, ai) => solvedAp[apKey(pi, ai)]);
  const entries = p.apartados.map((ap, ai) => solvedAp[apKey(pi, ai)] ? `<div class="dev-entry">${ap.desarrollo}</div>` : '').join('');
  html += `<div class="dev-panel">
    <div class="dev-panel-header"><div class="dev-dot${hasAny ? ' active' : ''}"></div><span class="dev-panel-title">Desarrollo paso a paso</span></div>
    <div class="dev-entries" id="dev-entries">${hasAny ? entries : '<div class="dev-empty">Responde correctamente para ver el desarrollo matemático.</div>'}</div>
  </div>`;

  pc.innerHTML = html;
  if (window.MathJax) MathJax.typesetPromise([pc]);
}

// ══════════════════════════════════════════
//  CHECK RESPUESTA
// ══════════════════════════════════════════
function checkAns(ai, oi) {
  const p = problems[currentProb], ap = p.apartados[ai], pi = currentProb;
  const btns = document.querySelectorAll(`#opts-${ai} .opt-btn`);
  const fb = document.getElementById(`fb-${ai}`);
  if (oi === ap.correcta) {
    btns.forEach((b, i) => { b.disabled = true; if (i === oi) b.classList.add('correct'); });
    fb.textContent = '✓ Correcto.'; fb.className = 'feedback correct'; fb.style.display = 'block';
    document.getElementById(`ap-card-${ai}`).classList.add('solved');
    solvedAp[apKey(pi, ai)] = true;
    const entriesEl = document.getElementById('dev-entries');
    if (entriesEl.querySelector('.dev-empty')) entriesEl.innerHTML = '';
    const entry = document.createElement('div'); entry.className = 'dev-entry'; entry.innerHTML = ap.desarrollo;
    entriesEl.appendChild(entry);
    document.querySelectorAll('.dev-dot').forEach(d => d.classList.add('active'));
    if (window.MathJax) MathJax.typesetPromise([entry]);
    setTimeout(() => { entriesEl.scrollTop = entriesEl.scrollHeight; }, 300);
    if (p.apartados.every((_, j) => solvedAp[apKey(pi, j)])) { solvedP.add(pi); buildTabs(); }
  } else {
    btns[oi].classList.add('wrong'); btns[oi].disabled = true;
    fb.textContent = 'Respuesta incorrecta. Inténtalo de nuevo.'; fb.className = 'feedback wrong'; fb.style.display = 'block';
  }
}

// ══════════════════════════════════════════
//  FORMULARIO TOGGLE
// ══════════════════════════════════════════
function toggleFormulario() {
  formularioOpen = !formularioOpen;
  const panel = document.getElementById('formulario-panel');
  const btn = document.getElementById('btn-formula');
  const txt = btn.querySelector('.btn-formula-txt');
  if (formularioOpen) {
    panel.classList.add('open'); btn.classList.add('open');
    txt.textContent = 'Ocultar fórmulas';
    if (window.MathJax) MathJax.typesetPromise([panel]);
  } else {
    panel.classList.remove('open'); btn.classList.remove('open');
    txt.textContent = 'Ver fórmulas';
  }
}

// ══════════════════════════════════════════
//  PIZARRA
// ══════════════════════════════════════════
let drawing = false, lastX = 0, lastY = 0, penColor = '#e8e8f0', penSize = 3;
let pizCanvas = null, pizCtx = null, pizReady = false;

function initPizarra() {
  pizCanvas = document.getElementById('pizarra-canvas');
  pizCtx = pizCanvas.getContext('2d');
  resizePiz();
  window.addEventListener('resize', resizePiz);
  function pos(e) { const r = pizCanvas.getBoundingClientRect(); const s = e.touches ? e.touches[0] : e; return { x: s.clientX - r.left, y: s.clientY - r.top }; }
  function start(e) { e.preventDefault(); drawing = true; const p = pos(e); lastX = p.x; lastY = p.y; }
  function move(e) {
    if (!drawing) return; e.preventDefault();
    const p = pos(e);
    pizCtx.beginPath(); pizCtx.moveTo(lastX, lastY); pizCtx.lineTo(p.x, p.y);
    pizCtx.strokeStyle = penColor; pizCtx.lineWidth = penSize;
    pizCtx.lineCap = 'round'; pizCtx.lineJoin = 'round'; pizCtx.stroke();
    lastX = p.x; lastY = p.y;
  }
  function stop() { drawing = false; }
  pizCanvas.addEventListener('mousedown', start); pizCanvas.addEventListener('mousemove', move);
  pizCanvas.addEventListener('mouseup', stop); pizCanvas.addEventListener('mouseleave', stop);
  pizCanvas.addEventListener('touchstart', start, { passive: false });
  pizCanvas.addEventListener('touchmove', move, { passive: false });
  pizCanvas.addEventListener('touchend', stop);
  pizReady = true;
}

function resizePiz() {
  if (!pizCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = window.innerWidth, H = window.innerHeight - 52;
  pizCanvas.style.width = W + 'px'; pizCanvas.style.height = H + 'px';
  pizCanvas.width = W * dpr; pizCanvas.height = H * dpr;
  pizCtx.scale(dpr, dpr);
  pizCtx.fillStyle = '#0e0e1a'; pizCtx.fillRect(0, 0, W, H);
}

function openPizarra() { document.getElementById('pizarra-overlay').classList.add('open'); document.body.style.overflow = 'hidden'; if (!pizReady) initPizarra(); }
function closePizarra() { document.getElementById('pizarra-overlay').classList.remove('open'); document.body.style.overflow = ''; }
function clearCanvas() { if (!pizCtx) return; pizCtx.fillStyle = '#0e0e1a'; pizCtx.fillRect(0, 0, pizCanvas.width / (window.devicePixelRatio || 1), pizCanvas.height / (window.devicePixelRatio || 1)); }
function setColor(col, btn) { penColor = col; document.querySelectorAll('.btn-color').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function setSize(sz, btn) { penSize = sz; document.querySelectorAll('.btn-size').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

window.onload = () => { buildTabs(); renderProblem(); };
