<script>
function formularioHTML(){
  return `<div class="formulario-inner">
    <div class="form-sec-title" style="color:var(--blue)">Complementario · Unión · Diferencia</div>
    <div class="form-card blue"><div class="form-name">Complementario</div><div class="form-expr">$P(\\bar{A})=1-P(A)$</div></div>
    <div class="form-card blue"><div class="form-name">Unión (al menos uno)</div><div class="form-expr">$P(A\\cup B)=P(A)+P(B)-P(A\\cap B)$</div></div>
    <div class="form-card blue"><div class="form-name">Diferencia</div><div class="form-expr">$P(A-B)=P(A)-P(A\\cap B)$</div></div>
    <div class="form-sec-title" style="color:var(--teal);margin-top:4px">Intersección · Condicionada</div>
    <div class="form-card teal"><div class="form-name">Regla del producto</div><div class="form-expr">$P(A\\cap B)=P(A)\\cdot P(B\\mid A)$</div></div>
    <div class="form-card teal"><div class="form-name">Probabilidad condicionada</div><div class="form-expr">$P(A\\mid B)=\\dfrac{P(A\\cap B)}{P(B)}$</div><div class="form-note">«Prob. de A <b>sabiendo que B</b> ya ocurrió»</div></div>
    <div class="form-sec-title" style="color:var(--orange);margin-top:4px">Probabilidad total · Bayes</div>
    <div class="form-card orange"><div class="form-name">Probabilidad total</div><div class="form-expr">$P(A)=\\sum_i P(B_i)\\cdot P(A\\mid B_i)$</div><div class="form-note">Suma de <b>todos los caminos</b> del árbol que llevan a A.</div></div>
    <div class="form-card purple"><div class="form-name">Bayes</div><div class="form-expr">$P(B_i\\mid A)=\\dfrac{P(B_i)\\cdot P(A\\mid B_i)}{P(A)}$</div><div class="form-note">«Dar la vuelta» a la condicionada.</div></div>
    <div class="form-sec-title" style="color:var(--lime);margin-top:4px">Independencia · Incompatibilidad</div>
    <div class="form-card lime"><div class="form-name">Independientes</div><div class="form-expr">$P(A\\cap B)=P(A)\\cdot P(B)$</div><div class="form-note">Equiv.: $P(A\\mid B)=P(A)$</div></div>
    <div class="form-card lime"><div class="form-name">Incompatibles</div><div class="form-expr">$P(A\\cap B)=0$</div><div class="form-note">No pueden ocurrir a la vez.</div></div>
    <a class="form-link" href="3_0-formulario-probabilidad.html">Ver formulario completo →</a>
  </div>`;
}

const problems = [

// ───────────────────────────────────────────
// P1 · TRANSPORTE
// ───────────────────────────────────────────
{id:1,tipo:"Probabilidad total · Bayes",titulo:"Movilidad urbana y retrasos",
contexto:`El departamento de movilidad de una gran ciudad elaboró un informe sobre los hábitos de desplazamiento al trabajo. Según los datos, <strong>de cada diez ciudadanos que trabajan fuera de casa, seis optan por el transporte público</strong> —autobús, metro o tranvía— mientras que los cuatro restantes se desplazan en vehículo particular. El estudio también recopiló información sobre puntualidad: <strong>entre quienes habitualmente van en transporte público, tres de cada diez reconocen llegar tarde con frecuencia</strong> a su lugar de trabajo. Este porcentaje, sin embargo, <strong>se reduce a la mitad entre los conductores de vehículo privado</strong>. El informe señala además que factores externos como obras o accidentes afectan a todos los colectivos por igual, aunque las diferencias en puntualidad entre grupos son estadísticamente significativas. Se selecciona al azar a uno de estos ciudadanos trabajadores.`,
apartados:[
  {letra:"a",clase:"q-sucesos",
   pregunta:"Lee el enunciado y elige la opción que define <strong>correctamente el suceso L</strong> para este problema.",
   opciones:["$L$ = «el ciudadano seleccionado llega tarde con frecuencia al trabajo»","$L$ = «el ciudadano seleccionado usa transporte público»","$L$ = «el ciudadano seleccionado trabaja lejos de casa»"],
   correcta:0,
   desarrollo:`<b>Definición de sucesos:</b><br>
El enunciado describe dos características: medio de transporte y puntualidad.<br>
• <span class="sym">T</span> = «usa transporte público» · <span class="sym">$V=\\bar{T}$</span> = «usa vehículo privado»<br>
• <span class="sym">L</span> = «llega tarde con frecuencia»<br><br>
<span class="warn">⚠ Error frecuente:</span> definir el suceso por el dato numérico. «Llegar tarde» es el <em>suceso</em>; el 30 % y el 15 % son probabilidades condicionadas de ese suceso.`},
  {letra:"b",clase:"q-translate",
   pregunta:"«Este porcentaje se reduce a la mitad entre los conductores de vehículo privado». ¿Cómo se escribe ese dato en notación formal?",
   opciones:["$P(L\\mid V)=0{,}15$  (la mitad de 0,30)","$P(V\\mid L)=0{,}15$","$P(L\\cap V)=0{,}15$"],

  problems.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===currentProb?' active':'')+(solvedP.has(i)?' solved':'');
    btn.innerHTML=`<span class="tab-num">${i+1}</span>`;
    btn.onclick=()=>{currentProb=i;formularioOpen=false;buildTabs();renderProblem();};
    row.appendChild(btn);
  });
  chip.textContent=`P ${currentProb+1}/${problems.length}`;
}

function renderProblem(){
  const pc=document.getElementById('page-content');
  pc.style.animation='none';
  requestAnimationFrame(()=>{pc.style.animation='';});
  const p=problems[currentProb],pi=currentProb;

  let html=`
  <div class="prob-header">
    <div class="prob-num-badge">${p.id}</div>
    <div class="prob-meta"><span class="prob-type-tag">${p.tipo}</span><div class="prob-title">${p.titulo}</div></div>
  </div>
  <div class="contexto-card">
    <span class="contexto-tag">📋 Lee el enunciado con atención</span>
    <div class="contexto-text">${p.contexto}</div>
  </div>
  <div class="actions-bar">
    <button class="btn-formula${formularioOpen?' open':''}" id="btn-formula" onclick="toggleFormulario()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      ${formularioOpen?'Ocultar formulario':'Ver formulario'}
    </button>
    <button class="btn-pizarra" onclick="openPizarra()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <div class="btn-pizarra-label"><span>Pizarra</span><span class="btn-pizarra-sub">táctil</span></div>
    </button>
  </div>
  <div class="formulario-panel${formularioOpen?' open':''}" id="formulario-panel">
    ${formularioHTML()}
  </div>
  <div class="apartados-wrap">`;

  p.apartados.forEach((ap,ai)=>{
    const solved=!!solvedAp[apKey(pi,ai)];
    const extraClass=ap.clase?` ${ap.clase}`:'';
    html+=`<div class="apartado-card${extraClass}${solved?' solved':''}" id="ap-card-${ai}">
      <div class="apartado-head">
        <div class="apartado-label">Apartado ${ap.letra.toUpperCase()} <span class="check-icon">✓</span></div>
        <div class="apartado-q">${ap.pregunta}</div>
      </div>
      <div class="opts-list" id="opts-${ai}">
        ${ap.opciones.map((o,oi)=>`
          <button class="opt-btn${solved&&oi===ap.correcta?' correct':''}" ${solved?'disabled':''} onclick="checkAns(${ai},${oi})">
            <div class="opt-letter">${['A','B','C'][oi]}</div><span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="feedback${solved?' correct':''}" id="fb-${ai}" style="display:${solved?'block':'none'}">${solved?'✓ Correcto.':''}</div>
    </div>`;
  });

  html+=`</div>`;
  const hasAny=p.apartados.some((_,ai)=>solvedAp[apKey(pi,ai)]);
  const entries=p.apartados.map((ap,ai)=>solvedAp[apKey(pi,ai)]?`<div class="dev-entry">${ap.desarrollo}</div>`:'').join('');
  html+=`<div class="dev-panel">
    <div class="dev-panel-header"><div class="dev-dot${hasAny?' active':''}"></div><span class="dev-panel-title">Desarrollo paso a paso</span></div>
    <div class="dev-entries" id="dev-entries">${hasAny?entries:'<div class="dev-empty">Responde correctamente para ver el desarrollo matemático.</div>'}</div>
  </div>`;

  pc.innerHTML=html;
  if(window.MathJax)MathJax.typesetPromise([pc]);
}

function checkAns(ai,oi){
  const p=problems[currentProb],ap=p.apartados[ai],pi=currentProb;
  const btns=document.querySelectorAll(`#opts-${ai} .opt-btn`);
  const fb=document.getElementById(`fb-${ai}`);
  if(oi===ap.correcta){
    btns.forEach((b,i)=>{b.disabled=true;if(i===oi)b.classList.add('correct');});
    fb.textContent='✓ Correcto.';fb.className='feedback correct';fb.style.display='block';
    document.getElementById(`ap-card-${ai}`).classList.add('solved');
    solvedAp[apKey(pi,ai)]=true;
    const entries=document.getElementById('dev-entries');
    if(entries.querySelector('.dev-empty'))entries.innerHTML='';
    const entry=document.createElement('div');entry.className='dev-entry';entry.innerHTML=ap.desarrollo;
    entries.appendChild(entry);
    document.querySelectorAll('.dev-dot').forEach(d=>d.classList.add('active'));
    if(window.MathJax)MathJax.typesetPromise([entry]);
    setTimeout(()=>{entries.scrollTop=entries.scrollHeight;},300);
    if(p.apartados.every((_,j)=>solvedAp[apKey(pi,j)])){solvedP.add(pi);buildTabs();}
  }else{
    btns[oi].classList.add('wrong');btns[oi].disabled=true;
    fb.textContent='Respuesta incorrecta. Inténtalo de nuevo.';fb.className='feedback wrong';fb.style.display='block';
  }
}

function toggleFormulario(){
  formularioOpen=!formularioOpen;
  const panel=document.getElementById('formulario-panel');
  const btn=document.getElementById('btn-formula');
  if(formularioOpen){
    panel.classList.add('open');btn.classList.add('open');
    btn.innerHTML=btn.innerHTML.replace('Ver formulario','Ocultar formulario');
    if(window.MathJax)MathJax.typesetPromise([panel]);
  }else{
    panel.classList.remove('open');btn.classList.remove('open');
    btn.innerHTML=btn.innerHTML.replace('Ocultar formulario','Ver formulario');
  }
}

let drawing=false,lastX=0,lastY=0,penColor='#e8e8f0',penSize=3;
let pizCanvas=null,pizCtx=null,pizReady=false;
function initPizarra(){
  pizCanvas=document.getElementById('pizarra-canvas');
  pizCtx=pizCanvas.getContext('2d');
  resizePiz();
  window.addEventListener('resize',resizePiz);
  function pos(e){const r=pizCanvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  function start(e){e.preventDefault();drawing=true;const p=pos(e);lastX=p.x;lastY=p.y;}
  function move(e){
    if(!drawing)return;e.preventDefault();
    const p=pos(e);
    pizCtx.beginPath();pizCtx.moveTo(lastX,lastY);pizCtx.lineTo(p.x,p.y);
    pizCtx.strokeStyle=penColor;pizCtx.lineWidth=penSize;
    pizCtx.lineCap='round';pizCtx.lineJoin='round';pizCtx.stroke();
    lastX=p.x;lastY=p.y;
  }
  function stop(){drawing=false;}
  pizCanvas.addEventListener('mousedown',start);pizCanvas.addEventListener('mousemove',move);
  pizCanvas.addEventListener('mouseup',stop);pizCanvas.addEventListener('mouseleave',stop);
  pizCanvas.addEventListener('touchstart',start,{passive:false});
  pizCanvas.addEventListener('touchmove',move,{passive:false});
  pizCanvas.addEventListener('touchend',stop);
  pizReady=true;
}
function resizePiz(){
  if(!pizCanvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=window.innerWidth,H=window.innerHeight-52;
  pizCanvas.style.width=W+'px';pizCanvas.style.height=H+'px';
  pizCanvas.width=W*dpr;pizCanvas.height=H*dpr;
  pizCtx.scale(dpr,dpr);
  pizCtx.fillStyle='#0e0e1a';pizCtx.fillRect(0,0,W,H);
}
function openPizarra(){document.getElementById('pizarra-overlay').classList.add('open');document.body.style.overflow='hidden';if(!pizReady)initPizarra();}
function closePizarra(){document.getElementById('pizarra-overlay').classList.remove('open');document.body.style.overflow='';}
function clearCanvas(){if(!pizCtx)return;pizCtx.fillStyle='#0e0e1a';pizCtx.fillRect(0,0,pizCanvas.width/(window.devicePixelRatio||1),pizCanvas.height/(window.devicePixelRatio||1));}
function setColor(col,btn){penColor=col;document.querySelectorAll('.btn-color').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setSize(sz,btn){penSize=sz;document.querySelectorAll('.btn-size').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

window.onload=()=>{buildTabs();renderProblem();};
</script>
